name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # =========================
      # JAVA 17 (MANDATORY FIX)
      # =========================
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # =========================
      # PYTHON
      # =========================
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # =========================
      # SYSTEM DEPENDENCIES
      # =========================
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip wget \
            build-essential autoconf libtool pkg-config \
            libffi-dev libssl-dev

      # =========================
      # PYTHON PACKAGES
      # =========================
      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install cython buildozer kivy==2.3.0 numpy

      # =========================
      # ANDROID SDK (FIXED + STABLE)
      # =========================
      - name: Install Android SDK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME

          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools

          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O tools.zip
          unzip tools.zip
          mv cmdline-tools latest

          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin

          # 🔥 FIX LICENSE ISSUE
          yes | sdkmanager --licenses || true
          yes | sdkmanager --licenses

          # 🔥 USE STABLE BUILD-TOOLS (NOT 37)
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      # =========================
      # FIX AIDL PATH
      # =========================
      - name: Fix PATH (AIDL fix)
        run: |
          echo "$HOME/android-sdk/build-tools/33.0.2" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      # =========================
      # CLEAN BUILD (VERY IMPORTANT)
      # =========================
      - name: Clean build
        run: |
          rm -rf .buildozer

      # =========================
      # BUILD APK
      # =========================
      - name: Build APK
        run: |
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$ANDROID_HOME/build-tools/33.0.2

          buildozer -v android debug

      # =========================
      # UPLOAD APK
      # =========================
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
